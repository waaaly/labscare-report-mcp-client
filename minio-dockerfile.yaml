version: '3'
services:
  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"    # API 端口（代码调用）
      - "9001:9001"    # Web 控制台端口（浏览器访问）
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./data:/data   # 映射数据存储路径
    command: server /data --console-address ":9001"
    restart: always
